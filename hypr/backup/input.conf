input {
	kb_layout = us, ru
	repeat_delay = 450
	repeat_rate = 40
	sensitivity = +0.4
	touchpad {
		disable_while_typing = false
		natural_scroll = true
		scroll_factor = 1.25
	}
}

gestures {
	gesture = 4, horizontal, workspace
	gesture = 4, horizontal, mod: SUPER, workspace
	gesture = 4, horizontal, mod: ALT, workspace
	gesture = 4, horizontal, mod: CTRL, workspace
	gesture = 4, horizontal, mod: SHIFT, workspace
	workspace_swipe_distance = 500
}
